name: backend

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - app

  user-api:
    image: ${DOCKERHUB_USERNAME}/user-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4000"
      REDIS_HOST: redis
      NODE_OPTIONS: --no-deprecation
    depends_on:
      - redis
    networks:
      - app

  batch:
    image: ${DOCKERHUB_USERNAME}/batch:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "4002"
      REDIS_HOST: redis
    depends_on:
      - redis
    networks:
      - app

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt:ro
      - webroot:/var/www/certbot
    depends_on:
      - user-api
    networks:
      - app

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

volumes:
  redis-data:
  letsencrypt:
  webroot:

networks:
  app:
    driver: bridge
